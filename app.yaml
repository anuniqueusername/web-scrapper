name: competitor-scraper
services:
- name: web
  github:
    repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
    branch: main
  source_dir: .
  dockerfile_path: ./Dockerfile
  build_command: ""
  http_port: 3000
  health_check:
    http_path: /
    http_port: 3000
    initial_delay_seconds: 60
    period_seconds: 30
    timeout_seconds: 10
    success_threshold: 1
    failure_threshold: 5

