name: competitor-scraper
services:
- name: web
  github:
    repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
    branch: main
  build_command: bash build.sh
  http_port: 3000
  health_check:
    http_path: /dashboard
    http_port: 3000
    initial_delay_seconds: 30
    period_seconds: 10
    timeout_seconds: 5
    success_threshold: 1
    failure_threshold: 3
  envs:
  - key: NODE_ENV
    value: production
