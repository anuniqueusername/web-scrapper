# =============================================================================
# GitHub Actions — Production Deployment
# Project: Kijiji Competitor Scraper (Next.js dashboard + Node.js Puppeteer scraper)
#
# Trigger: push to main branch (or manual via workflow_dispatch)
#
# Pipeline overview:
#   Job 1 — build-check   : Install deps + npm run build on GitHub runner
#                           Catches broken builds BEFORE touching production.
#                           Uploads .next/ artefact for the deploy job to reuse.
#
#   Job 2 — deploy        : Needs job 1 to pass.
#                           Writes .env.production on the server from GitHub Secrets.
#                           Runs deploy-scripts/08-remote-deploy.sh over SSH:
#                             - git pull latest code
#                             - npm ci (clean, deterministic install)
#                             - Reuses .next/ from job 1 (no rebuild on server)
#                             - Symlinks shared/ data dir + config files
#                             - pm2 reload next-app  (zero-downtime cluster reload)
#                             - pm2 restart scraper-worker (graceful kill + restart)
#                             - Prunes releases older than KEEP_RELEASES=5
#                           Verifies localhost:3000 health check before finishing.
#                           Sends Discord notification (pass or fail).
#
# -----------------------------------------------------------------------
# GitHub Secrets required (Settings -> Secrets and variables -> Actions):
# -----------------------------------------------------------------------
#
#   DROPLET_HOST               Public IP or hostname of the Digital Ocean droplet
#   DROPLET_USER               SSH username on the droplet  (e.g. deploy)
#   DROPLET_SSH_KEY            Full PEM private key contents (-----BEGIN ... -----)
#   DROPLET_SSH_PORT           SSH port — omit to default to 22
#
# App runtime secrets (written to .env.production on the server):
#   APP_BASE_URL               https://yourdomain.com  (no trailing slash)
#   APP_PORT                   3000  (omit to default to 3000)
#   APP_DISCORD_WEBHOOK_URL    Scraper listing-alert webhook
#   APP_SLACK_WEBHOOK_URL      Scraper listing-alert webhook
#   APP_SESSION_SECRET         64-char random hex string for future auth layer
#   APP_SCRAPER_DEFAULT_URL    Default Kijiji search URL
#   APP_PUPPETEER_PATH         Path to system Chromium (default: /usr/bin/chromium-browser)
#
# Notification:
#   DISCORD_DEPLOY_WEBHOOK     Deployment status webhook (can be same as APP_DISCORD_WEBHOOK_URL)
#
# Estimated total run time: 4–8 minutes (Next.js build is the slow step)
# =============================================================================

name: Deploy to Digital Ocean

on:
  push:
    branches:
      - main

  # Manual trigger with optional overrides
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: 'main'
      skip_build:
        description: 'Skip Next.js build (use if only scraper/config files changed)'
        type: boolean
        required: false
        default: false

# Queue deployments for the same branch; never cancel an in-flight deploy
# because a half-deployed state is worse than waiting.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Restrict GITHUB_TOKEN permissions to the minimum needed
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build validation on GitHub-hosted runner
  # ---------------------------------------------------------------------------
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set up Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Cache the npm store between runs to speed up npm ci
          cache: 'npm'

      # npm ci: honours package-lock.json exactly, fails if lock is out of sync.
      # PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: avoids downloading 300 MB of Chromium
      # on the CI runner — we only need to verify the Next.js build compiles.
      - name: Install dependencies
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: npm ci --prefer-offline --no-audit --no-fund

      # Provide the minimum env vars Next.js needs at build time so that
      # NEXT_PUBLIC_* references don't cause build errors.
      # Uses `next build --webpack` (not Turbopack) — see next.config.js for why.
      # `set -euo pipefail` is implicit in GitHub Actions run steps; any non-zero
      # exit from next build will fail this step loudly before the upload runs.
      - name: Build Next.js
        if: ${{ github.event.inputs.skip_build != 'true' }}
        env:
          NODE_ENV: production
          NEXT_PUBLIC_BASE_URL: ${{ secrets.APP_BASE_URL || 'https://example.com' }}
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: |
          echo "--- Node/npm versions ---"
          node --version
          npm --version
          echo "--- Current directory ---"
          pwd
          echo "--- Files in root ---"
          ls -la | head -20
          echo "--- Starting next build --webpack ---"
          npm run build || { echo "BUILD FAILED"; cat .next/BUILD_ID 2>/dev/null || echo "No BUILD_ID found"; exit 1; }
          echo "--- Build completed successfully ---"
          echo "--- Checking .next/ exists ---"
          test -d .next && echo ".next/ directory exists" || echo "ERROR: .next/ directory missing"

      # Verify .next/ was actually produced before attempting to upload.
      # next build --webpack writes .next/BUILD_ID on success; if it is absent
      # the build silently failed and we must abort here with a clear message
      # rather than letting the upload step emit the cryptic "No files found" error.
      - name: Verify build output
        if: ${{ github.event.inputs.skip_build != 'true' && always() }}
        run: |
          echo "--- Checking for .next/ directory ---"
          if [ ! -d .next ]; then
            echo "❌ ERROR: .next/ directory does not exist — the build failed"
            echo "--- Listing root directory ---"
            ls -la
            exit 1
          fi
          echo "✓ .next/ directory exists"

          echo "--- Checking for BUILD_ID ---"
          if [ ! -f .next/BUILD_ID ]; then
            echo "❌ ERROR: .next/BUILD_ID not found — Next.js build did not complete successfully"
            echo "--- Full .next/ tree (for debugging) ---"
            find .next -type f -maxdepth 2 | head -30 | sort
            exit 1
          fi
          echo "✓ BUILD_ID found: $(cat .next/BUILD_ID)"

          echo "--- .next/ directory size ---"
          du -sh .next/

          echo "--- Top-level .next/ entries ---"
          ls -1 .next/

          echo "--- Build output verified successfully ---"

      # Save the compiled .next/ directory so the deploy job can rsync it to
      # the server instead of rebuilding there (faster + identical binary).
      # Exclude .next/cache — it can be hundreds of MB and is not needed.
      - name: Upload .next artifact
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: .next/
          exclude-patterns: |
            .next/cache/**
          # Fail the job explicitly if .next/ is somehow still missing
          if-no-files-found: error
          # Short retention — only needed for the deploy job that follows
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 2: Deploy to Digital Ocean droplet
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: build-check
    timeout-minutes: 20
    # Links this job to a GitHub Environment named "production".
    # Add required reviewers in Settings -> Environments for manual approval.
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      # Download the .next/ artefact built in job 1 so we can rsync it
      - name: Download .next artifact
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: .next/

      # Write the SSH private key to a locked-down temp file.
      # ssh-agent is intentionally NOT used here — a file is simpler and
      # avoids leaving the key loaded in memory after this step.
      - name: Install SSH key
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Populate known_hosts so SSH doesn't prompt for host verification
          ssh-keyscan \
            -p "${{ secrets.DROPLET_SSH_PORT || '22' }}" \
            "${{ secrets.DROPLET_HOST }}" \
            >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSH key and known_hosts configured."

      # Build .env.production from GitHub Secrets and encode it as base64 so
      # it can be passed safely as a single environment variable over SSH
      # (avoids shell escaping issues with special characters in webhook URLs).
      - name: Build .env.production (base64)
        id: env_b64
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          APP_PORT: ${{ secrets.APP_PORT || '3000' }}
          APP_DISCORD_WEBHOOK_URL: ${{ secrets.APP_DISCORD_WEBHOOK_URL }}
          APP_SLACK_WEBHOOK_URL: ${{ secrets.APP_SLACK_WEBHOOK_URL }}
          APP_DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
          APP_SESSION_SECRET: ${{ secrets.APP_SESSION_SECRET }}
          APP_SCRAPER_DEFAULT_URL: ${{ secrets.APP_SCRAPER_DEFAULT_URL || 'https://www.kijiji.ca/b-canada/vending-machine/k0l0?view=list' }}
          APP_PUPPETEER_PATH: ${{ secrets.APP_PUPPETEER_PATH || '/usr/bin/chromium-browser' }}
        run: |
          ENV_FILE=$(cat <<EOF
          NODE_ENV=production
          PORT=${APP_PORT}
          NEXT_PUBLIC_BASE_URL=${APP_BASE_URL}
          DISCORD_WEBHOOK_URL=${APP_DISCORD_WEBHOOK_URL}
          DISCORD_DEPLOY_WEBHOOK=${APP_DISCORD_DEPLOY_WEBHOOK}
          SLACK_WEBHOOK_URL=${APP_SLACK_WEBHOOK_URL}
          SESSION_SECRET=${APP_SESSION_SECRET}
          SCRAPER_DEFAULT_URL=${APP_SCRAPER_DEFAULT_URL}
          SCRAPER_DEFAULT_INTERVAL=60000
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
          PUPPETEER_EXECUTABLE_PATH=${APP_PUPPETEER_PATH}
          EOF
          )
          # Strip leading whitespace introduced by heredoc indentation
          ENV_FILE=$(echo "$ENV_FILE" | sed 's/^[[:space:]]*//')
          echo "value=$(echo "$ENV_FILE" | base64 -w 0)" >> "$GITHUB_OUTPUT"

      # Create a tarball of the project for transfer.
      # The .next/ directory from the artefact download is included here so the
      # server does not need to rebuild. Persistent data and secrets are excluded.
      - name: Create release tarball
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next/cache' \
            --exclude='data' \
            --exclude='scraper-config.json' \
            --exclude='scraper-status.json' \
            --exclude='facebook-scraper-status.json' \
            --exclude='*.log' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='tmp' \
            --exclude='temp' \
            -czf /tmp/release.tar.gz .
          echo "Tarball size: $(du -sh /tmp/release.tar.gz | cut -f1)"

      # Copy the tarball and the remote deploy script to the server in parallel
      - name: Upload release tarball and deploy script
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -p ${{ secrets.DROPLET_SSH_PORT || '22' }} -o BatchMode=yes -o ConnectTimeout=30 -o StrictHostKeyChecking=no"
          SCP_OPTS="-i ~/.ssh/deploy_key -P ${{ secrets.DROPLET_SSH_PORT || '22' }} -o BatchMode=yes -o ConnectTimeout=30 -o StrictHostKeyChecking=no"
          DEST="${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}"

          scp $SCP_OPTS /tmp/release.tar.gz "${DEST}:/tmp/release-${{ github.sha }}.tar.gz"
          scp $SCP_OPTS deploy-scripts/08-remote-deploy.sh "${DEST}:/tmp/08-remote-deploy.sh"
          echo "Upload complete."

      # SSH into the server and execute the remote deploy script.
      # All deploy logic lives in 08-remote-deploy.sh for easier local testing.
      - name: Run remote deploy
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -p "${{ secrets.DROPLET_SSH_PORT || '22' }}" \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -o StrictHostKeyChecking=no \
            "${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}" \
            "chmod +x /tmp/08-remote-deploy.sh && \
             ENV_B64='${{ steps.env_b64.outputs.value }}' \
             RELEASE_ARCHIVE='/tmp/release-${{ github.sha }}.tar.gz' \
             GIT_SHA='${{ github.sha }}' \
             SKIP_BUILD='${{ github.event.inputs.skip_build || 'false' }}' \
             APP_USER='${{ secrets.DROPLET_USER }}' \
             bash /tmp/08-remote-deploy.sh"

      # Verify the app is serving HTTP after PM2 reload.
      # Checks localhost:3000 on the server side (avoids DNS/SSL timing issues).
      - name: Health check (remote)
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -p "${{ secrets.DROPLET_SSH_PORT || '22' }}" \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -o StrictHostKeyChecking=no \
            "${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}" \
            "$(cat <<'HEALTHCHECK'
              set -e
              echo 'Waiting for Next.js to be ready...'
              for i in $(seq 1 18); do
                CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:3000 2>/dev/null || echo 000)
                if echo "$CODE" | grep -qE '^(200|301|302|304)$'; then
                  echo "Health check passed (HTTP $CODE) on attempt $i"
                  exit 0
                fi
                echo "Attempt $i/18: HTTP $CODE — retrying in 5s..."
                sleep 5
              done
              echo "ERROR: Health check failed after 90 seconds"
              pm2 logs next-app --lines 30 --nostream || true
              exit 1
            HEALTHCHECK
            )"

      # Always clean up the SSH key — even on failure
      - name: Remove SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      # -----------------------------------------------------------------------
      # Discord notifications
      # The || true at the end of each curl means a notification failure
      # never marks the deployment as failed.
      # -----------------------------------------------------------------------
      - name: Discord — deploy succeeded
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' | cut -c1-100)
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(cat <<JSON
            {
              "embeds": [{
                "title": "Deployment Succeeded",
                "color": 3066993,
                "fields": [
                  {"name": "Commit", "value": "\`${SHORT_SHA}\` ${COMMIT_MSG}", "inline": false},
                  {"name": "Author", "value": "${{ github.actor }}", "inline": true},
                  {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
                  {"name": "Run", "value": "[#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": true}
                ]
              }]
            }
          JSON
          )" || true

      - name: Discord — deploy failed
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(cat <<JSON
            {
              "embeds": [{
                "title": "Deployment FAILED",
                "color": 15158332,
                "description": "See the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.",
                "fields": [
                  {"name": "Commit", "value": "\`${SHORT_SHA}\`", "inline": true},
                  {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
                  {"name": "Triggered by", "value": "${{ github.actor }}", "inline": true}
                ]
              }]
            }
          JSON
          )" || true
