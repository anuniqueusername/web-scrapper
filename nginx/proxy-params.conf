# =============================================================================
# Nginx Proxy Parameters Snippet
#
# Deploy to: /etc/nginx/snippets/proxy-params.conf
#
# This file is included by app.conf via:
#   include /etc/nginx/snippets/proxy-params.conf;
#
# Copy command:
#   cp nginx/proxy-params.conf /etc/nginx/snippets/proxy-params.conf
# =============================================================================

# Pass the real client IP and protocol to Next.js
proxy_set_header Host               $host;
proxy_set_header X-Real-IP          $remote_addr;
proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto  $scheme;
proxy_set_header X-Forwarded-Host   $host;
proxy_set_header X-Forwarded-Port   $server_port;

# HTTP/1.1 required for keepalive
proxy_http_version 1.1;
proxy_set_header Upgrade    $http_upgrade;
proxy_set_header Connection 'upgrade';

# Timeouts — generous for SSE / long-poll routes used by the dashboard
proxy_connect_timeout   10s;
proxy_send_timeout      60s;
proxy_read_timeout      60s;

# Buffer settings — disable buffering for streaming API responses
proxy_buffering         off;
proxy_request_buffering off;

# Cache bypass — never cache API or dynamic routes
proxy_cache_bypass      $http_upgrade;

# Gzip — let Next.js handle its own compression; Nginx gzip for static files
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/x-javascript
    image/svg+xml;
