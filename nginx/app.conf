# =============================================================================
# Nginx Reverse Proxy Configuration — Kijiji Competitor Scraper
#
# Deployment path: /etc/nginx/sites-available/web-scraper.conf
# Enable with:     ln -sf /etc/nginx/sites-available/web-scraper.conf \
#                         /etc/nginx/sites-enabled/
#
# Replace YOUR_DOMAIN_HERE with your actual domain (or leave as _ for IP-only).
# After DNS + certbot are set up, SSL blocks are added automatically by certbot.
#
# Test config:  nginx -t
# Reload:       systemctl reload nginx
# =============================================================================

# Upstream — the Next.js cluster managed by PM2
upstream nextjs_upstream {
    # PM2 cluster binds to 127.0.0.1:3000; if you change PORT in PM2
    # ecosystem.config.js, update this too.
    server 127.0.0.1:3000;

    # Enable connection keep-alive to the upstream for better performance
    keepalive 64;
}

# ---------------------------------------------------------------------------
# HTTP server — redirects to HTTPS (or serves directly if no SSL yet)
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;

    # Replace with your real domain. Use _ to match any hostname (IP-only).
    server_name YOUR_DOMAIN_HERE;

    # Let's Encrypt ACME challenge — must be reachable over HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    # Once SSL is configured, certbot will replace the block below with a
    # 301 redirect to https://. Until then, proxy directly over HTTP.
    location / {
        proxy_pass http://nextjs_upstream;
        include /etc/nginx/snippets/proxy-params.conf;
    }
}

